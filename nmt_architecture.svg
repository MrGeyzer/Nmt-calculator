<svg width="680" height="540" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="680" height="540" fill="#ffffff" rx="12"/>

  <!-- ── Outer container: main.pas ── -->
  <rect x="40" y="28" width="600" height="464" rx="18" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="340" y="60" text-anchor="middle" font-size="15" font-weight="600" fill="#3C3489">main.pas — NMTCalculator</text>
  <text x="340" y="79" text-anchor="middle" font-size="12" fill="#534AB7">uses: unit_data, unit_algo, unit_output, Windows</text>

  <!-- ── TSubject data structure ── -->
  <rect x="200" y="100" width="280" height="92" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="340" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">TSubject (record)</text>
  <line x1="200" y1="133" x2="480" y2="133" stroke="#B4B2A9" stroke-width="0.6"/>
  <text x="340" y="150" text-anchor="middle" font-size="11.5" fill="#5F5E5A">name: String</text>
  <text x="340" y="167" text-anchor="middle" font-size="11.5" fill="#5F5E5A">score: Integer (100–200) · weight: Real</text>
  <text x="340" y="183" text-anchor="middle" font-size="11" fill="#888780">→ TArrayOfSubject</text>

  <!-- ── unit_data ── -->
  <rect x="60" y="248" width="168" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="144" y="273" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">unit_data.pas</text>
  <line x1="60" y1="282" x2="228" y2="282" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="144" y="298" text-anchor="middle" font-size="11" fill="#0F6E56">InputData(</text>
  <text x="144" y="315" text-anchor="middle" font-size="11" fill="#0F6E56">var arr, var n)</text>

  <!-- ── unit_algo ── -->
  <rect x="256" y="248" width="168" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="340" y="273" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">unit_algo.pas</text>
  <line x1="256" y1="282" x2="424" y2="282" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="298" text-anchor="middle" font-size="11" fill="#0F6E56">CalculateCompetitive</text>
  <text x="340" y="315" text-anchor="middle" font-size="11" fill="#0F6E56">Score(): Real</text>

  <!-- ── unit_output ── -->
  <rect x="452" y="248" width="168" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="536" y="273" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">unit_output.pas</text>
  <line x1="452" y1="282" x2="620" y2="282" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="536" y="298" text-anchor="middle" font-size="11" fill="#0F6E56">PrintResults(arr,</text>
  <text x="536" y="315" text-anchor="middle" font-size="11" fill="#0F6E56">n, finalScore)</text>

  <!-- ── dashed arrows: data struct → modules ── -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <line x1="270" y1="192" x2="178" y2="248" stroke="#888780" stroke-width="0.9" stroke-dasharray="4 3" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="325" y1="192" x2="334" y2="248" stroke="#888780" stroke-width="0.9" stroke-dasharray="4 3" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="400" y1="192" x2="504" y2="248" stroke="#888780" stroke-width="0.9" stroke-dasharray="4 3" marker-end="url(#arr)" opacity="0.7"/>

  <!-- ── flow arrows: data → algo → output ── -->
  <line x1="228" y1="288" x2="254" y2="288" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="424" y1="288" x2="450" y2="288" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="241" y="283" text-anchor="middle" font-size="10" fill="#534AB7">arr, n</text>
  <text x="437" y="283" text-anchor="middle" font-size="10" fill="#534AB7">score</text>

  <!-- ── algo box ── -->
  <rect x="110" y="390" width="460" height="74" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="340" y="415" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">Алгоритм розрахунку</text>
  <text x="340" y="436" text-anchor="middle" font-size="12" fill="#854F0B">finalScore = Σ ( score[i] × weight[i] )</text>
  <text x="340" y="453" text-anchor="middle" font-size="11" fill="#BA7517">де score[i] ∈ [100, 200], weight[i] — ваговий коефіцієнт</text>

  <!-- arrow unit_algo → formula -->
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <line x1="340" y1="328" x2="340" y2="390" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arr3)" opacity="0.8"/>

  <!-- ── legend ── -->
  <line x1="60" y1="500" x2="84" y2="500" stroke="#888780" stroke-width="0.9" stroke-dasharray="4 3" opacity="0.7"/>
  <text x="90" y="504" font-size="11" fill="#5F5E5A">використовує структуру</text>
  <line x1="270" y1="500" x2="290" y2="500" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="296" y="504" font-size="11" fill="#5F5E5A">передає дані</text>
  <rect x="430" y="493" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="447" y="504" font-size="11" fill="#5F5E5A">модуль</text>
  <rect x="516" y="493" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="533" y="504" font-size="11" fill="#5F5E5A">алгоритм</text>

</svg>
